# ===============================
# DATABASE (H2 in-memory, simulating PostgreSQL)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate creates tables on the fly for testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway in tests (H2 doesn't need it)
spring.flyway.enabled=false

# ===============================
# KAFKA CONFIGURATION (Test/EmbeddedKafka)
# ===============================
# EmbeddedKafka will auto-populate this for integration tests
spring.kafka.bootstrap-servers=localhost:9092

# --- Consumer Configuration for Tests ---
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.max.poll.records=100

# --- Listener Configuration ---
spring.kafka.listener.type=batch
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=1  # Single thread for predictable test ordering
spring.kafka.listener.poll.timeout=3000

# --- Producer Configuration ---
spring.kafka.producer.acks=all

# --- Test-specific properties ---
spring.kafka.properties.request.timeout.ms=60000

