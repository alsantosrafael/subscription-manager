spring.application.name=subscription-manager
spring.profiles.active=local
spring.threads.virtual.enabled=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/subscription_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Hikari
# ===============================
spring.datasource.hikari.minimum-idle=20

# --- HIKARI TUNING ---
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.leak-detection-threshold=5000
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=30000

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=none

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.baseline-on-migrate=false

# Log levels for debug
#logging.level.org.flywaydb=DEBUG
#logging.level.org.hibernate.SQL=DEBUG

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.modulith.events=INFO

# ==========================================
# KAFKA CONFIGURATION
# ==========================================
# --- Bootstrap & Connection ---
spring.kafka.bootstrap-servers=localhost:9092

# --- Producer Configuration ---
# Delivery & Retries
spring.kafka.producer.delivery.timeout.ms=120000
spring.kafka.producer.retries=5
spring.kafka.producer.retry.backoff.ms=500
spring.kafka.producer.buffer.memory=33554432

# Performance: Batching & Compression
spring.kafka.producer.linger.ms=20
spring.kafka.producer.batch.size=131072
spring.kafka.producer.compression.type=lz4

# Reliability: Idempotence & Acks
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.acks=all
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.retries=2147483647

# Transactional Support (optional, for exactly-once semantics)
# spring.kafka.producer.transaction-id-prefix=subscription-manager-tx-

# --- Consumer Configuration ---
# Offset Strategy: Important for billing (use 'earliest' for critical data)
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.max.poll.records=50

# Consumer Group coordination timeouts (prevents rebalancing during processing)
spring.kafka.consumer.properties.session.timeout.ms=45000
spring.kafka.consumer.properties.heartbeat.interval.ms=10000
spring.kafka.consumer.properties.max.poll.interval.ms=300000

# Fetch tuning: balance latency vs throughput
spring.kafka.consumer.properties.fetch.min.bytes=1024
spring.kafka.consumer.properties.fetch.max.wait.ms=500

# Isolation level for reading: read_committed ensures no uncommitted messages
spring.kafka.consumer.properties.isolation.level=read_committed

# --- Listener Configuration ---
# Batch processing with manual acknowledgment for transactional safety
spring.kafka.listener.type=batch
spring.kafka.listener.ack-mode=manual_immediate
# Concurrency: scaled to partition count (10 for renewals, 3 for billing-results)
spring.kafka.listener.concurrency=3
spring.kafka.listener.renewals-concurrency=10
# Poll timeout for batch processing
spring.kafka.listener.poll.timeout=5000
spring.kafka.listener.immediate-stop=false
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- Request Timeout (global, inherited by producer & consumer) ---
spring.kafka.properties.request.timeout.ms=60000
spring.kafka.properties.connections.max.idle.ms=540000

# --- Client ID for monitoring & debugging ---
spring.kafka.client-id=subscription-manager

# --- Observability ---
spring.kafka.listener.observation-enabled=true

# ==========================================
# Modulith
# ==========================================
spring.modulith.events.jdbc.schema-initialization.enabled=true
spring.modulith.events.externalization.enabled=true

# ==========================================
# Product Params
# ==========================================
billing.retry.max-attempts=3
billing.retry.base-delay-minutes=5
billing.inflight-guard-minutes=5

# ==========================================
# Integrations
# ==========================================
payment.gateway.url=http://localhost:8081
payment.gateway.api-key=sk_test_123
payment.token.encryption-key=3C4bsB0GaKoZJcM2zGKepGmizBgha7ut/UhKV4BEzQU=

# ==========================================
# Observability
# ==========================================

management.endpoints.web.exposure.include=prometheus,health,metrics,retryevents,circuitbreakerevents
management.metrics.tags.application=${spring.application.name}

# ==========================================
# Resilience4j
# ==========================================

# Circuit Breaker - Instance: gatewayPayment
resilience4j.circuitbreaker.instances.gatewayPayment.register-health-indicator=true
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-size=20
resilience4j.circuitbreaker.instances.gatewayPayment.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.gatewayPayment.minimum-number-of-calls=10
# 10s: short enough to recover quickly during a demo
resilience4j.circuitbreaker.instances.gatewayPayment.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.gatewayPayment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gatewayPayment.event-consumer-buffer-size=10

resilience4j.retry.instances.gatewayCharge.max-attempts=3
resilience4j.retry.instances.gatewayCharge.wait-duration=1s
resilience4j.retry.instances.gatewayCharge.enable-exponential-backoff=true
resilience4j.retry.instances.gatewayCharge.exponential-backoff-multiplier=2
resilience4j.retry.instances.gatewayCharge.retry-exceptions=org.springframework.web.client.RestClientException,java.util.concurrent.TimeoutException
resilience4j.retry.instances.gatewayCharge.ignore-exceptions=com.platform.subscription_manager.shared.domain.exceptions.UnprocessableEntityException,com.platform.subscription_manager.shared.domain.exceptions.ResourceNotFoundException,com.platform.subscription_manager.billing.infrastructure.web.integrations.PaymentGatewayClient$GatewayLogicalFailureException


# ==========================================
# Redis Configuration
# ==========================================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# ==========================================
# OpenAPI / Swagger UI
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false
