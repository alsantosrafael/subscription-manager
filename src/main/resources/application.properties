spring.application.name=subscription-manager
spring.profiles.active=local
spring.threads.virtual.enabled=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/subscription_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Hikari
# ===============================
spring.datasource.hikari.minimum-idle=20

# --- HIKARI TUNING ---
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.leak-detection-threshold=5000

spring.datasource.hikari.maximum-pool-size=150
# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=none

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.baseline-on-migrate=false

# Log levels for debug
#logging.level.org.flywaydb=DEBUG
#logging.level.org.hibernate.SQL=DEBUG

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.modulith.events=INFO

# ==========================================
# KAFKA CONFIGURATION
# ==========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=5
spring.kafka.consumer.max-poll-records=100
spring.kafka.listener.type=batch

# ==========================================
# Modulith
# ==========================================
spring.modulith.events.jdbc.schema-initialization.enabled=true
spring.modulith.events.externalization.enabled=true

# ==========================================
# Product Params
# ==========================================
billing.retry.max-attempts=3
billing.retry.base-delay-minutes=1
billing.inflight-guard-minutes=1

# ==========================================
# Integrations
# ==========================================
payment.gateway.url=http://localhost:8081
payment.gateway.api-key=sk_test_123
payment.token.encryption-key=3C4bsB0GaKoZJcM2zGKepGmizBgha7ut/UhKV4BEzQU=

# ==========================================
# Observability
# ==========================================

management.endpoints.web.exposure.include=prometheus,health,metrics
management.metrics.tags.application=${spring.application.name}
spring.kafka.listener.observation-enabled=true


# ==========================================
# Resilience4j
# ==========================================

# Circuit Breaker - Instance: gatewayPayment
resilience4j.circuitbreaker.instances.gatewayPayment.register-health-indicator=true
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-size=20
resilience4j.circuitbreaker.instances.gatewayPayment.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.gatewayPayment.minimum-number-of-calls=10
# 10s: short enough to recover quickly during a demo
resilience4j.circuitbreaker.instances.gatewayPayment.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.gatewayPayment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gatewayPayment.event-consumer-buffer-size=10

# Retry - Instance: initialCharge
resilience4j.retry.instances.initialCharge.max-attempts=${billing.retry.max-attempts:3}
resilience4j.retry.instances.initialCharge.wait-duration=1s
resilience4j.retry.instances.initialCharge.enable-exponential-backoff=true
resilience4j.retry.instances.initialCharge.exponential-backoff-multiplier=2
resilience4j.retry.instances.initialCharge.retry-exceptions=org.springframework.web.client.RestClientException,java.util.concurrent.TimeoutException
resilience4j.retry.instances.initialCharge.ignore-exceptions=com.platform.subscription_manager.shared.domain.exceptions.UnprocessableEntityException,com.platform.subscription_manager.shared.domain.exceptions.ResourceNotFoundException,com.platform.subscription_manager.billing.infrastructure.web.integrations.PaymentGatewayClient$GatewayLogicalFailureException


# ==========================================
# Redis Configuration
# ==========================================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# ==========================================
# OpenAPI / Swagger UI
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false
