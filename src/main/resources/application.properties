spring.application.name=subscription-manager
spring.profiles.active=local
spring.threads.virtual.enabled=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/subscription_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# Hikari
# ===============================
spring.datasource.hikari.minimum-idle=20
# --- HIKARI TUNING ---
# Tempo m?ximo para conseguir uma conex?o do pool (calculado acima)
spring.datasource.hikari.connection-timeout=30000

# Tempo m?ximo que uma conex?o pode ficar aberta (evita vazamento)
# Deve ser menor que o timeout do Postgres (geralmente 30min)
spring.datasource.hikari.max-lifetime=1800000

# Tempo que uma conex?o ociosa pode sobreviver no pool
spring.datasource.hikari.idle-timeout=600000

# Prote??o contra "leak" de conex?es (se a thread travar)
# Se uma conex?o ficar aberta por mais de 5s, o Hikari avisa no log
spring.datasource.hikari.leak-detection-threshold=5000

# O tamanho do pool que definimos antes
spring.datasource.hikari.maximum-pool-size=150
# ===============================
# JPA / HIBERNATE
# ===============================
# Flyway owns the schema ? Hibernate must not validate or alter it
spring.jpa.hibernate.ddl-auto=none

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.baseline-on-migrate=false

# Log levels for debug
#logging.level.org.flywaydb=DEBUG
#logging.level.org.hibernate.SQL=DEBUG

# Mostra as queries no console para debugarmos os indices e o N+1
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.modulith.events=DEBUG

# ==========================================
# KAFKA CONFIGURATION
# ==========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=5
spring.kafka.consumer.max-poll-records=100
spring.kafka.listener.type=batch

# ==========================================
# Modulith
# ==========================================
spring.modulith.events.jdbc.schema-initialization.enabled=true
spring.modulith.events.externalization.enabled=true

# ==========================================
# Product Params
# ==========================================
billing.retry.max-attempts=3
billing.retry.base-delay-minutes=1
billing.retry.delay.enabled=false

# ==========================================
# Integrations
# ==========================================
payment.gateway.url=http://localhost:8081
payment.gateway.api-key=sk_test_123

# AES-256-GCM key for encrypting payment tokens at rest.
# DEV ONLY ? hardcoded for the challenge. Replace with env var in production.
payment.token.encryption-key=3C4bsB0GaKoZJcM2zGKepGmizBgha7ut/UhKV4BEzQU=

# ==========================================
# Observability
# ==========================================

management.endpoints.web.exposure.include=prometheus,health,metrics
management.metrics.tags.application=${spring.application.name}
spring.kafka.listener.observation-enabled=true


# ==========================================
# Resilience4j
# ==========================================

# Circuit Breaker - Instance: gatewayPayment
resilience4j.circuitbreaker.instances.gatewayPayment.register-health-indicator=true
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-size=10
resilience4j.circuitbreaker.instances.gatewayPayment.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.gatewayPayment.sliding-window-type=TIME_BASED
resilience4j.circuitbreaker.instances.gatewayPayment.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.gatewayPayment.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.gatewayPayment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gatewayPayment.event-consumer-buffer-size=10

# Retry - Instance: initialCharge
resilience4j.retry.instances.initialCharge.max-attempts=${billing.retry.max-attempts:3}
resilience4j.retry.instances.initialCharge.wait-duration=1s
resilience4j.retry.instances.initialCharge.enable-exponential-backoff=true
resilience4j.retry.instances.initialCharge.exponential-backoff-multiplier=2
resilience4j.retry.instances.initialCharge.retry-exceptions=org.springframework.web.client.RestClientException,java.util.concurrent.TimeoutException
resilience4j.retry.instances.initialCharge.ignore-exceptions=com.platform.subscription_manager.shared.domain.exceptions.UnprocessableEntityException,com.platform.subscription_manager.shared.domain.exceptions.ResourceNotFoundException


# ==========================================
# Redis Configuration
# ==========================================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
