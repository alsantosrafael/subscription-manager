  # JVM on port 8081 when SPRING_PROFILES_ACTIVE=local — no extra
  # container needed.
  #
  # First build the JAR (one-time, ~30s):
  #   ./gradlew bootJar -x test
  #
  # Then start everything:
  #   docker compose up --build
  #
  # Seed data:
  #   curl -s -X POST "http://localhost:8080/api/test/seed?count=20" | jq
  #
  # Trigger sweep manually:
  #   curl -s -X POST http://localhost:8080/v1/admin/billing/trigger-sweep
  #
  # Load test (requires k6):
  #   k6 run load-test.js
  # ---------------------------------------------------------------
#  app:
#    build:
#      context: .
#      dockerfile: Dockerfile
#    container_name: subscription-manager
#    ports:
#      - "8080:8080"
#    environment:
#      SPRING_PROFILES_ACTIVE: local
#      # Override localhost references from application.properties with Docker service hostnames
#      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subscription_db
#      SPRING_DATASOURCE_USERNAME: admin
#      SPRING_DATASOURCE_PASSWORD: admin
#      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
#      SPRING_DATA_REDIS_HOST: subscription-redis
#      # WireMock binds to localhost:8081 inside this JVM — correct even inside Docker
#      PAYMENT_GATEWAY_URL: http://localhost:8081
#      PAYMENT_GATEWAY_API_KEY: sk_test_123
#      PAYMENT_TOKEN_ENCRYPTION_KEY: 3C4bsB0GaKoZJcM2zGKepGmizBgha7ut/UhKV4BEzQU=
#    depends_on:
#      postgres:
#        condition: service_healthy
#      kafka:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
#    restart: on-failure
#    deploy:
#      resources:
#        limits:
#          memory: 1g

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    command: postgres -c max_connections=300
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: subscription_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d subscription_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Apache Kafka (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:8.0.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      # --- Memory & Heap ---
      KAFKA_HEAP_OPTS: "-Xms1G -Xmx1G"
      
      # --- Node & Process Configuration ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      
      # --- Listener Configuration ---
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092'
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      
      # --- Storage & Persistence ---
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      
      # --- Replication & Durability ---
      # NOTE: These default to 1 for single-node dev. For HA/production, use 3+ brokers with RF=2/3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      
      # --- Rebalancing & Group Coordination ---
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      
      # --- Connection & Session Timeouts (align with client configs) ---
      KAFKA_CONNECTIONS_MAX_IDLE_MS: 540000  # 9 minutes (matches client config)
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000  # 5 minutes
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 10000   # 10 seconds
      
      # --- Broker-to-Broker Communications ---
      KAFKA_REPLICA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_REPLICA_SOCKET_SEND_BUFFER_BYTES: 102400
      
      # --- Producer Performance Tuning ---
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600  # 100MB
      
      # --- Log Retention (adjust based on storage capacity) ---
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB segments
      KAFKA_LOG_CLEANUP_POLICY: 'delete'
      KAFKA_LOG_CLEANER_ENABLE: 'false'
      
      # --- Replication Performance ---
      KAFKA_REPLICA_FETCH_MAX_BYTES: 1048576
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      
      # --- Metadata Cache ---
      KAFKA_METADATA_CACHE_MAX_RETENTION_MS: 3600000  # 1 hour
      
      # --- Monitoring & Metrics ---
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 > /dev/null 2>&1 && kafka-consumer-groups --bootstrap-server 127.0.0.1:9092 --list > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 45s

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka_exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka_exporter
    command: --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7.2-alpine
    container_name: subscription-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  grafana_data:
